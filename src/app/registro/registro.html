<div class="pagina-registro">

  <form class="login"
        @formAnim
        [@errorAnim]="registerState">

    <div class="logo-wrapper"
         @logoAnim
         [@logoBreathing]="logoState">
      <div class="logo-mlb"></div>
    </div>

    <div class="grupo-registro icon-input">
      <span class="icon pelota"></span>
      <input type="text" placeholder="Nombre"
        [(ngModel)]="nombre" name="nombre"
        (focus)="setFocus('nombre')" (blur)="clearFocus()"
        [@inputAnim]="inputFocus === 'nombre' ? 'active' : 'inactive'">
    </div>

    <div class="grupo-registro icon-input">
      <span class="icon bate"></span>
      <input type="text" placeholder="Apellidos"
        [(ngModel)]="apellidos" name="apellidos"
        (focus)="setFocus('apellidos')" (blur)="clearFocus()"
        [@inputAnim]="inputFocus === 'apellidos' ? 'active' : 'inactive'">
    </div>

    <div class="grupo-registro icon-input">
      <span class="icon pelota"></span>
      <input type="email" placeholder="Correo electrónico"
        [(ngModel)]="email" name="email"
        (focus)="setFocus('email')" (blur)="clearFocus()"
        [@inputAnim]="inputFocus === 'email' ? 'active' : 'inactive'">
    </div>

    <div class="grupo-registro icon-input">
      <span class="icon bate"></span>
      <input type="password" placeholder="Contraseña"
        [(ngModel)]="contrasenna" name="contrasenna"
        (focus)="setFocus('password')" (blur)="clearFocus()"
        [@inputAnim]="inputFocus === 'contrasenna' ? 'active' : 'inactive'">
    </div>

    <div class="grupo-registro icon-input">
      <span class="icon pelota"></span>
      <input type="password" placeholder="Confirmar contraseña"
        [(ngModel)]="confirmarContrasenna" name="confirmarContrasenna"
        (focus)="setFocus('confirmPassword')" (blur)="clearFocus()"
        [@inputAnim]="inputFocus === 'confirmarContrasenna' ? 'active' : 'inactive'">
    </div>

    <button type="button" class="entrar" (click)="register()" @buttonAnim>
      Registrarse
    </button>

    <p *ngIf="mensajeError" class="error-text">
      {{ mensajeError }}
    </p>

    <p class="registro">
      ¿Ya tienes cuenta?
      <a routerLink="/login">Inicia sesión</a>
    </p>

  </form>

</div>
